services:

  aethergate-server:
    build:
      context: ./server
      dockerfile: AetherGate.Server/Dockerfile
    platform: linux/amd64
    ports:
      - "9000:9000"   # 클라이언트 TCP
      - "8090:8090"   # Akka.Remote (내부)
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER:-AetherGate}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-AetherGateClient}
      - REDIS_URL=redis:6379
    depends_on:
      redis:
        condition: service_healthy

  aethergate-web:
    build:
      context: ./web
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER:-AetherGate}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-AetherGateClient}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/aethergate
      - REDIS_URL=redis://redis:6379
      - BASE_URL=${BASE_URL:-http://localhost:8000}
      - GUEST_ENABLED=${GUEST_ENABLED:-true}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID:-}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=aethergate
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
