name: CD

on:
  push:
    branches: [main]

env:
  AWS_REGION:       ap-northeast-2
  ECR_SERVER_REPO:  aethergate-server
  ECR_WEB_REPO:     aethergate-web
  ECS_CLUSTER:      aethergate
  ECS_SERVER_SVC:   aethergate-server
  ECS_WEB_SVC:      aethergate-web

jobs:
  deploy:
    name: ECR 푸시 & ECS 배포
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS 자격증명 확인
        id: check-secrets
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "AWS_ACCESS_KEY_ID가 설정되지 않아 배포를 건너뜁니다."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: AWS 자격증명 설정
        if: steps.check-secrets.outputs.skip == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: ECR 로그인
        if: steps.check-secrets.outputs.skip == 'false'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── 게임 서버 이미지 ─────────────────────────────────────────────────
      - name: 게임 서버 이미지 빌드 & 푸시
        if: steps.check-secrets.outputs.skip == 'false'
        env:
          IMAGE: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_SERVER_REPO }}:${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -f server/AetherGate.Server/Dockerfile \
            -t $IMAGE \
            ./server
          docker push $IMAGE
          docker tag $IMAGE ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_SERVER_REPO }}:latest
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_SERVER_REPO }}:latest

      # ── 웹 서버 이미지 ───────────────────────────────────────────────────
      - name: 웹 서버 이미지 빌드 & 푸시
        if: steps.check-secrets.outputs.skip == 'false'
        env:
          IMAGE: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB_REPO }}:${{ github.sha }}
        run: |
          docker build \
            --platform linux/arm64 \
            -f web/Dockerfile \
            -t $IMAGE \
            ./web
          docker push $IMAGE
          docker tag $IMAGE ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB_REPO }}:latest
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB_REPO }}:latest

      # ── ECS 롤링 배포 ────────────────────────────────────────────────────
      - name: 게임 서버 ECS 배포
        if: steps.check-secrets.outputs.skip == 'false'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVER_SVC }} \
            --force-new-deployment

      - name: 웹 서버 ECS 배포
        if: steps.check-secrets.outputs.skip == 'false'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_WEB_SVC }} \
            --force-new-deployment

      - name: 배포 완료 대기 (웹 서버)
        if: steps.check-secrets.outputs.skip == 'false'
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_WEB_SVC }}
